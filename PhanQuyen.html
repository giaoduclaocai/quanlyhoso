<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="ketnoi.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        .panel { background: #ffffff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .panel-form { max-width: 350px; }
        h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 2px solid #8E24AA; padding-bottom: 8px; margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #555; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; outline: none; }
        .form-input:focus { border-color: #8E24AA; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: #333; }
        
        .btn { padding: 8px 12px; font-size: 13px; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; color: white; width: 100%; margin-top: 10px; }
        .btn-save { background-color: #8E24AA; } .btn-save:hover { background-color: #6A1B9A; }
        .btn-clear { background-color: #757575; } .btn-clear:hover { background-color: #616161; }
        
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #8E24AA; color: white; text-align: left; padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; color: #333; }
        tr:hover { background: #f3e5f5; }
        
        .action-link { color: #1976D2; cursor: pointer; font-weight: 600; margin-right: 10px; text-decoration: underline; }
        .action-link.delete { color: #d32f2f; }
        .status { text-align: center; color: #8E24AA; font-weight: bold; font-size: 13px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="panel panel-form">
        <h3>Thông tin Cấp quyền</h3>
        <div class="form-group">
            <label>Họ và tên cán bộ:</label>
            <input type="text" id="pq-name" class="form-input" placeholder="VD: Nguyễn Văn A">
        </div>
        <div class="form-group">
            <label>Email xác thực (Quan trọng):</label>
            <input type="email" id="pq-email" class="form-input" placeholder="VD: nguyenvana@truong.edu.vn">
        </div>
        <div class="form-group">
            <label>Chỉ định Phân quyền:</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="role-taohoso" value="taohoso"> Nút Tạo hồ sơ</label>
                <label class="checkbox-label"><input type="checkbox" id="role-ganhoso" value="ganhoso"> Nút Gán hồ sơ</label>
                <label class="checkbox-label" style="color:#d32f2f; font-weight: bold;">
                    <input type="checkbox" id="role-xx" value="xx"> Quản trị viên (Cấp quyền)
                </label>
            </div>
        </div>
        <button class="btn btn-save" onclick="saveUser()">Lưu Cập Nhật</button>
        <button class="btn btn-clear" onclick="clearForm()">Làm Mới Form</button>
        <div id="status-msg" class="status">Đang xử lý...</div>
    </div>

    <div class="panel">
        <h3>Danh sách Cán bộ đã phân quyền</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Họ và tên</th>
                        <th>Email</th>
                        <th>Chi tiết Quyền</th>
                        <th width="100">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr><td colspan="4" style="text-align:center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() { loadUsers(); });

        function loadUsers() {
            fetch(KETNOI.WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'getUsers' })
            }).then(response => response.json()).then(result => {
                if (result.status === 'success') { renderTable(result.data); }
            });
        }

        function renderTable(users) {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Chưa có dữ liệu phân quyền.</td></tr>'; return;
            }
            users.forEach(user => {
                const tr = document.createElement('tr');
                let displayRoles = [];
                if (user.roles.includes('taohoso')) displayRoles.push('Tạo hồ sơ');
                if (user.roles.includes('ganhoso')) displayRoles.push('Gán hồ sơ');
                if (user.roles.includes('xx')) displayRoles.push('<b style="color:#d32f2f">Quản trị viên</b>');

                tr.innerHTML = `
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${displayRoles.join(' | ')}</td>
                    <td>
                        <span class="action-link" onclick="editUser('${user.name}', '${user.email}', '${user.roles}')">Sửa</span>
                        <span class="action-link delete" onclick="deleteUser('${user.email}')">Xóa</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function editUser(name, email, roles) {
            document.getElementById('pq-name').value = name;
            document.getElementById('pq-email').value = email;
            document.getElementById('role-taohoso').checked = roles.includes('taohoso');
            document.getElementById('role-ganhoso').checked = roles.includes('ganhoso');
            document.getElementById('role-xx').checked = roles.includes('xx');
        }

        function clearForm() {
            document.getElementById('pq-name').value = ''; document.getElementById('pq-email').value = '';
            document.getElementById('role-taohoso').checked = false; document.getElementById('role-ganhoso').checked = false; document.getElementById('role-xx').checked = false;
        }

        function saveUser() {
            const name = document.getElementById('pq-name').value.trim();
            const email = document.getElementById('pq-email').value.trim();
            if (!name || !email) { alert("Yêu cầu nhập đủ Họ tên và Email!"); return; }

            let roles = [];
            if (document.getElementById('role-taohoso').checked) roles.push('taohoso');
            if (document.getElementById('role-ganhoso').checked) roles.push('ganhoso');
            if (document.getElementById('role-xx').checked) roles.push('xx');

            document.getElementById('status-msg').style.display = 'block';
            fetch(KETNOI.WEB_APP_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'saveUser', name: name, email: email, roles: roles.join(',') })
            }).then(response => response.json()).then(result => {
                document.getElementById('status-msg').style.display = 'none';
                if (result.status === 'success') {
                    alert("Cập nhật quyền thành công!"); clearForm(); loadUsers();
                    window.parent.postMessage('reload_desktop', '*'); // Gửi lệnh ra index.html để làm mới
                }
            });
        }

        function deleteUser(email) {
            if (confirm("Thầy/Cô có chắc chắn muốn thu hồi toàn bộ quyền của email: " + email + " ?")) {
                document.getElementById('status-msg').style.display = 'block';
                fetch(KETNOI.WEB_APP_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'deleteUser', email: email })
                }).then(response => response.json()).then(result => {
                    document.getElementById('status-msg').style.display = 'none';
                    if (result.status === 'success') {
                        alert("Đã thu hồi quyền!"); loadUsers();
                        window.parent.postMessage('reload_desktop', '*');
                    }
                });
            }
        }
    </script>
</body>
</html>
