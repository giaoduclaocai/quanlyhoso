<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="ketnoi.js"></script>
    
    <link id="sys-favicon" rel="icon" href="">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sys-title">Cổng thông tin Quản trị</title>
  
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://apis.google.com/js/api.js"></script> 
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('sys-title').innerText = KETNOI.TIEU_DE_TRANG;
            document.getElementById('sys-favicon').href = KETNOI.LINK_LOGO;
            document.getElementById('sys-logo').src = KETNOI.LINK_LOGO;
            document.getElementById('sys-name').innerText = KETNOI.TEN_DINH_DANH;
        });

        (function() {
            var savedBgUrl = localStorage.getItem("ht_dashboard_bg");
            if (savedBgUrl && savedBgUrl.trim() !== "") {
                document.documentElement.style.setProperty('--default-bg', "url('" + savedBgUrl + "')");
            }
        })();
    </script>

    <style>
        :root { --default-bg: url('https://i.ibb.co/hJy3vH7y/hinh-nen-win-11-50-1.jpg'); }
        * { box-sizing: border-box; user-select: none; }
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #2c3e50; background-image: var(--default-bg); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; display: flex; flex-direction: column; }

        #desktop-area { flex: 1; padding: 10px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 15px 5px; overflow: hidden; position: relative; }
        .desktop-icon { width: 90px; min-height: 105px; display: flex; flex-direction: column; align-items: center; padding: 6px; border: 1px solid transparent; border-radius: 4px; cursor: pointer; transition: background 0.1s; touch-action: none; }
        .desktop-icon:hover { background-color: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); }
        .desktop-icon:active { background-color: rgba(255, 255, 255, 0.25); }
        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); pointer-events: none; }
        .icon-box .material-icons { font-size: 28px; color: #ffffff; }

        .bg-1 { background: linear-gradient(135deg, #1976D2, #42A5F5); } .bg-2 { background: linear-gradient(135deg, #F57F17, #FBC02D); } .bg-3 { background: linear-gradient(135deg, #388E3C, #66BB6A); } .bg-4 { background: linear-gradient(135deg, #00796B, #26A69A); } .bg-5 { background: linear-gradient(135deg, #7B1FA2, #AB47BC); } .bg-6 { background: linear-gradient(135deg, #5D4037, #8D6E63); } .bg-7 { background: linear-gradient(135deg, #D32F2F, #EF5350); } .bg-8 { background: linear-gradient(135deg, #E64A19, #FF7043); } .bg-9 { background: linear-gradient(135deg, #455A64, #78909C); } .bg-10 { background: linear-gradient(135deg, #0097A7, #26C6DA); }

        .icon-text { color: #ffffff; font-size: 12px; text-align: center; line-height: 1.3; text-shadow: 1px 1px 2px #000000, 0 0 10px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-wrap: break-word; pointer-events: none; }

        .taskbar { height: 48px; background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; }
        .start-btn { display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .start-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .start-logo { height: 28px; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); }
        .start-text { color: #ffffff; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }

        .system-tray { display: flex; align-items: center; gap: 10px; color: #ffffff; }
        .btn-taskbar { display: flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 13px; font-weight: 600; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .btn-taskbar.blue { background-color: #1976D2; } .btn-taskbar.blue:hover { background-color: #1565C0; }
        .btn-taskbar.green { background-color: #388E3C; } .btn-taskbar.green:hover { background-color: #2E7D32; }
        .btn-taskbar .material-icons { font-size: 16px; }

        .tray-icon { width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .tray-icon:hover { background: rgba(255, 255, 255, 0.15); }
        .tray-icon .material-icons { font-size: 20px; }
        .clock-container { text-align: right; font-size: 12px; line-height: 1.2; margin-left: 10px; padding: 0 5px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;}

        .win-tooltip { position: fixed; background: rgba(255, 255, 255, 0.95); border: 1px solid #bbbbbb; padding: 6px 12px; border-radius: 4px; font-size: 13px; color: #333333; box-shadow: 2px 2px 8px rgba(0,0,0,0.25); pointer-events: none; opacity: 0; z-index: 9999; max-width: 250px; line-height: 1.4; transition: opacity 0.15s ease-in-out; }

        .window-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .window-container { background: #ffffff; border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; animation: popIn 0.2s ease-out; }
        
        #window-utilities .window-container { width: 85vw; height: 85vh; }
        #window-gan-hoso .window-container { width: 440px; height: auto; }

        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .window-titlebar { background: #e0e0e0; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #cccccc; }
        .window-title { font-size: 14px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 5px; }
        .window-title .material-icons { font-size: 16px; color: #555; }
        .window-close { background: transparent; border: none; color: #333; font-weight: bold; font-size: 16px; cursor: pointer; width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .window-close:hover { background: #e81123; color: white; }
        .window-content { flex: 1; width: 100%; border: none; }

        /* Giao diện Form Gán Hồ Sơ (Native) */
        .form-native { padding: 20px; user-select: text; }
        .form-native .form-group { margin-bottom: 15px; }
        .form-native label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .form-native input, .form-native select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; font-family: inherit;}
        .form-native .input-group { display: flex; gap: 8px; }
        .form-native .btn-picker { display: flex; align-items: center; gap: 4px; background: #F57C00; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; white-space: nowrap; font-size: 12px; transition: background 0.2s;}
        .form-native .btn-picker:hover { background: #EF6C00; }
        .form-native .btn-submit { background-color: #1976D2; color: #ffffff; border: none; padding: 10px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .form-native .btn-submit:hover { background-color: #1565C0; }
        .form-native .status-text { text-align: center; font-size: 13px; font-weight: bold; color: #1976D2; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="desktop-area"></div>

    <div class="taskbar">
        <div class="start-btn" title="Hệ thống Quản trị Điều hành">
            <img src="" id="sys-logo" alt="Logo" class="start-logo">
            <span class="start-text" id="sys-name">Đang tải...</span>
        </div>
        
        <div class="system-tray">
            <button class="btn-taskbar blue" onclick="window.open('https://drive.google.com/drive/my-drive', '_blank')">
                <span class="material-icons">add_to_drive</span> Tạo hồ sơ
            </button>
            <button class="btn-taskbar green" onclick="toggleHoSoModal(true)">
                <span class="material-icons">attachment</span> Gán hồ sơ
            </button>

            <div class="tray-icon" onclick="resetPositions()" title="Khôi phục vị trí gốc của các biểu tượng">
                <span class="material-icons">restore</span>
            </div>
            <div class="tray-icon" onclick="toggleUtilities(true)" title="Mở Tiện ích dạy học">
                <span class="material-icons">build_circle</span>
            </div>
            <div class="tray-icon" onclick="changeBackgroundImage()" title="Cấu hình Hình nền Desktop">
                <span class="material-icons">wallpaper</span>
            </div>
            <div class="clock-container" id="sys-clock">
                --:--<br>--/--/----
            </div>
        </div>
    </div>

    <div id="win-tooltip" class="win-tooltip"></div>

    <div id="window-utilities" class="window-overlay">
        <div class="window-container">
            <div class="window-titlebar">
                <div class="window-title">
                    <span class="material-icons">build_circle</span> Tiện ích dạy học
                </div>
                <button class="window-close" onclick="toggleUtilities(false)" title="Đóng cửa sổ">✕</button>
            </div>
            <iframe src="tienich.html" class="window-content" title="Tiện ích"></iframe>
        </div>
    </div>

    <div id="window-gan-hoso" class="window-overlay">
        <div class="window-container">
            <div class="window-titlebar">
                <div class="window-title">
                    <span class="material-icons">attachment</span> Công cụ Gán Hồ sơ
                </div>
                <button class="window-close" onclick="toggleHoSoModal(false)" title="Đóng cửa sổ">✕</button>
            </div>
            <div class="form-native">
                <div class="form-group">
                    <label>Họ và tên (Cột A):</label>
                    <input type="text" id="hs-hoten" placeholder="Nhập họ và tên cán bộ/giáo viên...">
                </div>
                
                <div class="form-group">
                    <label>Tệp hồ sơ trên Drive (Cột B):</label>
                    <input type="text" id="hs-link" placeholder="Dán link thủ công hoặc chọn từ hệ thống..." style="margin-bottom: 8px;">
                    
                    <div class="input-group">
                        <button class="btn-picker" onclick="khoiTaoGooglePicker()" title="Dùng tài khoản đang đăng nhập">
                            <span class="material-icons" style="font-size: 16px;">folder_shared</span> TK Mặc định
                        </button>
                        <button class="btn-picker" style="background: #546E7A;" onclick="moDriveTaiKhoanKhac()" title="Chọn từ tài khoản Google khác">
                            <span class="material-icons" style="font-size: 16px;">switch_account</span> TK Khác
                        </button>
                    </div>
                    
                    <div id="huong-dan-tk" style="display:none; font-size: 12px; color: #c62828; margin-top: 8px; background: #ffebee; padding: 8px; border-radius: 4px; line-height: 1.4;">
                        <b>Hướng dẫn:</b> Hệ thống vừa mở trang Chọn Tài Khoản. Thầy hãy vào đúng tài khoản, copy đường link của thư mục hồ sơ và dán vào ô trống phía trên.
                    </div>
                </div>

                <div class="form-group">
                    <label>Giới tính (Cột C):</label>
                    <select id="hs-gioitinh">
                        <option value="">-- Chọn giới tính --</option>
                        <option value="x">Nam (x)</option>
                        <option value="xx">Nữ (xx)</option>
                    </select>
                </div>
                
                <button class="btn-submit" onclick="xuLyLuuHoSo()">Lưu Dữ Liệu Hồ Sơ</button>
                <div id="form-status" class="status-text">Đang xử lý, vui lòng chờ...</div>
            </div>
        </div>
    </div>

<script>
    let icons = [];
    let isDragging = false;
    const tooltip = document.getElementById('win-tooltip');
    const desktopArea = document.getElementById('desktop-area');

    /* =========================================================================
       0. KHỐI TƯƠNG TÁC API VỚI GOOGLE APPS SCRIPT
       ========================================================================= */
    function loadDesktopData() {
        fetch(KETNOI.WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'getIcons' }) 
        })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') { renderIconsFromData(result.data); } 
        })
        .catch(error => console.error("Lỗi:", error));
    }

    window.addEventListener("DOMContentLoaded", function() { loadDesktopData(); });

    function toggleHoSoModal(isShow) {
        document.getElementById('window-gan-hoso').style.display = isShow ? 'flex' : 'none';
        if(!isShow) {
            document.getElementById('hs-hoten').value = '';
            document.getElementById('hs-link').value = '';
            document.getElementById('hs-gioitinh').value = '';
            document.getElementById('huong-dan-tk').style.display = 'none'; // Ẩn hướng dẫn
        }
    }

    // MỞ GIAO DIỆN CHỌN TÀI KHOẢN KHÁC (Tính năng bổ sung)
    function moDriveTaiKhoanKhac() {
        // Gọi URL định tuyến Account Chooser của Google, sau đó trả về Drive
        window.open('https://accounts.google.com/AccountChooser?continue=https://drive.google.com/drive/', '_blank');
        // Hiển thị khung hướng dẫn copy/paste
        document.getElementById('huong-dan-tk').style.display = 'block';
    }

    function khoiTaoGooglePicker() {
        const statusText = document.getElementById('form-status');
        statusText.innerText = "Đang kết nối không gian Drive...";
        statusText.style.display = 'block';

        // Ẩn Form để có không gian Picker
        document.getElementById('window-gan-hoso').style.display = 'none';

        fetch(KETNOI.WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'getToken' })
        })
        .then(response => response.json())
        .then(result => {
            statusText.style.display = 'none';
            if (result.status === 'success' && result.token) {
                gapi.load('picker', function() {
                    var folderView = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
                        .setIncludeFolders(true)
                        .setSelectFolderEnabled(true);

                    var picker = new google.picker.PickerBuilder()
                        .enableFeature(google.picker.Feature.SUPPORT_DRIVES) 
                        .addView(folderView) 
                        .addView(google.picker.ViewId.DOCS) 
                        .setOAuthToken(result.token)
                        .setCallback(function(data) {
                            if (data.action == google.picker.Action.PICKED) {
                                document.getElementById('hs-link').value = data.docs[0].url;
                                document.getElementById('window-gan-hoso').style.display = 'flex';
                            } else if (data.action == google.picker.Action.CANCEL) {
                                document.getElementById('window-gan-hoso').style.display = 'flex';
                            }
                        })
                        .build();
                    picker.setVisible(true);
                });
            } else {
                alert("Lỗi kết nối Drive. Vui lòng thử lại.");
                document.getElementById('window-gan-hoso').style.display = 'flex'; 
            }
        })
        .catch(err => {
            alert("Lỗi mạng: " + err);
            document.getElementById('window-gan-hoso').style.display = 'flex'; 
        });
    }

    function xuLyLuuHoSo() {
        var hoTen = document.getElementById('hs-hoten').value.trim();
        var link = document.getElementById('hs-link').value.trim();
        var gioiTinh = document.getElementById('hs-gioitinh').value;

        if (!hoTen || !gioiTinh || !link) {
            alert("Đề nghị điền đầy đủ Họ tên, Giới tính và Chọn tệp hồ sơ!");
            return;
        }

        const statusText = document.getElementById('form-status');
        statusText.innerText = "Đang lưu dữ liệu vào hệ thống...";
        statusText.style.display = 'block';

        fetch(KETNOI.WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'saveProfile', hoTen: hoTen, link: link, gioiTinh: gioiTinh })
        })
        .then(response => response.json())
        .then(result => {
            statusText.style.display = 'none';
            if (result.status === 'success') {
                alert("Gán hồ sơ thành công!");
                toggleHoSoModal(false);
                loadDesktopData(); 
            } else { alert("Lỗi ghi dữ liệu: " + result.message); }
        });
    }

    function renderIconsFromData(data) {
        desktopArea.innerHTML = ''; 
        
        data.forEach((item, index) => {
            let gender = item.gender;
            let iconContent = '<span class="material-icons">folder</span>';
            let bgClass = 'bg-' + ((index % 10) + 1);

            if (gender === 'nam' || gender === 'x') {
                iconContent = '<span style="font-size: 32px;">👨‍🏫</span>'; bgClass = 'bg-1'; 
            } else if (gender === 'nữ' || gender === 'nu' || gender === 'xx') {
                iconContent = '<span style="font-size: 32px;">👩‍🏫</span>'; bgClass = 'bg-5'; 
            }

            const div = document.createElement('div');
            div.className = 'desktop-icon'; div.setAttribute('data-id', index + 1); div.setAttribute('data-desc', 'Nhấn để mở liên kết thư mục');
            div.innerHTML = `<div class="icon-box ${bgClass}">${iconContent}</div><span class="icon-text">${item.name}</span>`;
            div.onclick = function() { navigateTo(item.url, true); };
            desktopArea.appendChild(div);
        });
        
        icons = document.querySelectorAll('.desktop-icon');
        setupTooltipEvents();
        initializeLayout();
        setupDragEvents();
    }

    /* =========================================================================
       1. KHỐI XỬ LÝ ĐIỀU HƯỚNG VÀ TOOLTIP
       ========================================================================= */
    function navigateTo(url, isNewTab) {
        if (isDragging) { isDragging = false; return; }
        if (isNewTab) { window.open(url, '_blank'); } else { window.location.href = url; }
    }

    function setupTooltipEvents() {
        icons.forEach(icon => {
            icon.addEventListener('mouseenter', function(e) {
                if (isDragging) return; tooltip.innerText = this.getAttribute('data-desc'); tooltip.style.opacity = '1';
            });
            icon.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px';
            });
            icon.addEventListener('mouseleave', function() { tooltip.style.opacity = '0'; });
        });
    }

    /* =========================================================================
       2. KHỐI ĐỒNG HỒ VÀ LAYOUT
       ========================================================================= */
    function updateClock() {
        const now = new Date();
        document.getElementById('sys-clock').innerHTML = `${now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})}<br>${now.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit', year: 'numeric'})}`;
    }
    setInterval(updateClock, 1000); updateClock();

    function initializeLayout() {
        const savedPositions = JSON.parse(localStorage.getItem('ht_desktop_positions_v3')) || {};
        icons.forEach(icon => {
            const id = icon.getAttribute('data-id');
            if (savedPositions[id]) { icon.style.position = 'absolute'; icon.style.left = savedPositions[id].left; icon.style.top = savedPositions[id].top; icon.style.margin = '0'; }
        });
        setTimeout(() => {
            icons.forEach(icon => {
                if (icon.style.position !== 'absolute') {
                    const rect = icon.getBoundingClientRect(); const areaRect = desktopArea.getBoundingClientRect();
                    icon.style.left = (rect.left - areaRect.left) + 'px'; icon.style.top = (rect.top - areaRect.top) + 'px';
                }
            });
            icons.forEach(icon => { icon.style.position = 'absolute'; icon.style.margin = '0'; });
        }, 50);
    }

    let draggedIcon = null, offsetX = 0, offsetY = 0, dragThresholdPassed = false, startX, startY;
    function setupDragEvents() { icons.forEach(icon => { icon.addEventListener('mousedown', startDrag); icon.addEventListener('touchstart', startDrag, {passive: false}); }); }

    function startDrag(e) {
        if (e.target.closest('.icon-box') === null && e.target.closest('.icon-text') === null && e.target !== this) return;
        dragThresholdPassed = false; draggedIcon = this;
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX; const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        startX = clientX; startY = clientY;
        const rect = draggedIcon.getBoundingClientRect(); offsetX = clientX - rect.left; offsetY = clientY - rect.top;
        tooltip.style.opacity = '0'; 
        document.addEventListener('mousemove', drag); document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('mouseup', stopDrag); document.addEventListener('touchend', stopDrag);
    }

    function drag(e) {
        if (!draggedIcon) return;
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX; const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        if (Math.abs(clientX - startX) > 3 || Math.abs(clientY - startY) > 3) { dragThresholdPassed = true; isDragging = true; draggedIcon.style.zIndex = '9999'; draggedIcon.style.opacity = '0.7'; e.preventDefault(); }
        if (dragThresholdPassed) {
            const areaRect = desktopArea.getBoundingClientRect();
            let newLeft = Math.max(0, Math.min(clientX - areaRect.left - offsetX, areaRect.width - draggedIcon.offsetWidth));
            let newTop = Math.max(0, Math.min(clientY - areaRect.top - offsetY, areaRect.height - draggedIcon.offsetHeight));
            draggedIcon.style.left = newLeft + 'px'; draggedIcon.style.top = newTop + 'px';
        }
    }

    function stopDrag(e) {
        if (!draggedIcon) return;
        draggedIcon.style.zIndex = ''; draggedIcon.style.opacity = '1';
        if (dragThresholdPassed) { savePositions(); }
        document.removeEventListener('mousemove', drag); document.removeEventListener('touchmove', drag);
        document.removeEventListener('mouseup', stopDrag); document.removeEventListener('touchend', stopDrag);
        draggedIcon = null; setTimeout(() => { isDragging = false; }, 50);
    }

    function savePositions() {
        const positions = {};
        icons.forEach(icon => { positions[icon.getAttribute('data-id')] = { left: icon.style.left, top: icon.style.top }; });
        localStorage.setItem('ht_desktop_positions_v3', JSON.stringify(positions));
    }

    function resetPositions() {
        localStorage.removeItem('ht_desktop_positions_v3');
        icons.forEach(icon => { icon.style.position = ''; icon.style.left = ''; icon.style.top = ''; icon.style.margin = ''; });
        initializeLayout();
    }

    function changeBackgroundImage() {
        var currentUrl = localStorage.getItem("ht_dashboard_bg") || "";
        var newUrl = prompt("CẤU HÌNH HÌNH NỀN DESKTOP\n\nNhập đường dẫn (URL) hình ảnh:\n(Để trống nếu muốn quay về hình nền mặc định)", currentUrl);
        if (newUrl !== null) {
            if (newUrl.trim() === "") { localStorage.removeItem("ht_dashboard_bg"); document.documentElement.style.setProperty('--default-bg', "url('https://i.ibb.co/4gCSYHV6/congthongtin1.jpg')"); } 
            else { localStorage.setItem("ht_dashboard_bg", newUrl.trim()); document.documentElement.style.setProperty('--default-bg', "url('" + newUrl.trim() + "')"); }
        }
    }

    function toggleUtilities(isShow) { document.getElementById('window-utilities').style.display = isShow ? 'flex' : 'none'; }
</script>
</body>
</html>
